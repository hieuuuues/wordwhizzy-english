<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo Bộ Thẻ Tinh Gọn | Vocabulary Master</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
      :root {
        --primary-color: #5a67d8; /* Một sắc xanh tím mới, hiện đại hơn */
        --primary-hover: #434eac;
        --background: #fdfefe; /* Nền trắng sáng */
        --card-bg: #ffffff;
        --text-primary: #2d3748; /* Xám đậm cho tiêu đề */
        --text-secondary: #718096; /* Xám nhạt cho text phụ */
        --border-color: #edf2f7; /* Đường viền rất nhạt */
        --border-darker: #e2e8f0;
        --shadow: 0 4px 10px rgba(0, 0, 0, 0.05); /* Bóng nhẹ nhàng */
        --glow: 0 0 25px rgba(90, 103, 216, 0.3);
        --success: #48bb78;
        --error: #f56565;
        --warning: #f6ad55;
        --input-bg: #f7fafc; /* Nền input hơi ngả xám */
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.01);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: var(--background);
        color: var(--text-primary);
        padding: 2.5rem; /* Tăng padding tổng thể */
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .container {
        max-width: 900px;
        width: 100%;
        margin: auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2.5rem;
        animation: fadeIn 0.5s ease;
        gap: 1.5rem;
      }
      .header h1 {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--text-primary);
      }
      .header .back-button {
        background: var(--card-bg);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 0.85rem;
        cursor: pointer;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
        transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        text-decoration: none;
        font-size: 1.3rem;
      }
      .header .back-button:hover {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
        transform: translateY(-3px);
        box-shadow: var(--glow);
      }

      .config-section {
        background: var(--card-bg);
        padding: 2rem;
        border-radius: 18px;
        box-shadow: var(--shadow);
        margin-bottom: 2.5rem;
        animation: fadeIn 0.6s ease;
        border: 1px solid var(--border-color);
      }
      .config-header {
        font-size: 1.35rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-primary);
      }
      .setting {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0;
      }
      .setting-label {
        font-weight: 500;
        color: var(--text-primary);
        font-size: 1.05rem;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 34px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #cbd5e1;
        transition: 0.4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 26px;
        width: 26px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      input:checked + .slider {
        background-color: var(--primary-color);
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }

      .vocabulary-cards {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2.5rem;
      } /* Giảm gap */

      /* Thay đổi chính cho mỗi thẻ */
      .vocabulary-card {
        background: var(--card-bg);
        padding: 0.75rem 1.25rem; /* Giảm padding */
        border-radius: 12px; /* Nhỏ hơn */
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
        position: relative;
        animation: fadeIn 0.7s ease-out;
        display: flex;
        align-items: center; /* Căn giữa theo chiều dọc */
        gap: 0.75rem; /* Khoảng cách giữa các thành phần */
        flex-wrap: nowrap; /* Đảm bảo các thành phần không xuống dòng */
        overflow-x: auto; /* Cho phép cuộn ngang nếu nội dung quá dài */
        -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
        scrollbar-width: none; /* Ẩn scrollbar Firefox */
        -ms-overflow-style: none; /* Ẩn scrollbar IE/Edge */
      }
      .vocabulary-card::-webkit-scrollbar {
        display: none;
      } /* Ẩn scrollbar Webkit */

      .card-number {
        font-size: 0.9rem; /* Nhỏ hơn */
        font-weight: 600;
        color: var(--primary-color);
        flex-shrink: 0; /* Không co lại */
        width: 35px; /* Chiều rộng cố định cho số thứ tự */
        text-align: right;
        margin-right: 0.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem; /* Giảm gap */
        flex-grow: 1; /* Cho phép các input giãn nở */
        min-width: 100px; /* Đảm bảo có chiều rộng tối thiểu */
      }
      .form-group label {
        font-weight: 500;
        font-size: 0.8rem; /* Nhỏ hơn */
        color: var(--text-secondary);
        white-space: nowrap; /* Không xuống dòng label */
      }
      .form-group .main-label {
        color: var(--text-primary);
        font-weight: 600;
        font-size: 0.85rem;
      } /* Nhỏ hơn */

      .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem; /* Giảm padding */
        border: 1px solid var(--border-darker);
        border-radius: 8px; /* Nhỏ hơn */
        font-size: 0.9rem; /* Nhỏ hơn */
        background: var(--input-bg);
        transition: border-color 0.2s, box-shadow 0.2s;
        color: var(--text-primary);
      }
      .form-group input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.2);
        outline: none;
        background: white;
      }
      .form-group input::placeholder {
        color: #a0aec0;
        font-size: 0.85rem;
      } /* Placeholder nhỏ hơn */

      /* Khu vực ảnh siêu nhỏ hoặc icon */
      .image-upload-container {
        flex-shrink: 0; /* Không co lại */
        width: 48px; /* Kích thước ảnh cố định */
        height: 48px;
        position: relative;
        margin-left: 0.5rem;
      }
      .image-preview {
        width: 100%;
        height: 100%;
        border-radius: 8px; /* Bo tròn nhỏ hơn */
        border: 1px solid var(--border-darker); /* Viền mỏng hơn */
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        background-color: var(--input-bg);
        transition: all 0.2s ease;
      }
      .image-preview:hover {
        border-color: var(--primary-color);
        transform: scale(1.05);
      }
      .image-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 7px;
      }
      .image-preview .upload-icon {
        font-size: 1.2rem;
        color: #cbd5e1;
      } /* Icon nhỏ hơn */
      .image-preview input[type="file"] {
        display: none;
      }
      .image-remove-btn {
        position: absolute;
        top: -5px;
        right: -5px;
        background-color: var(--error);
        color: white;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 0.7rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease;
      }
      .image-remove-btn:hover {
        transform: scale(1.2);
      }

      .delete-button {
        background: transparent;
        color: var(--text-secondary);
        border: none;
        border-radius: 50%;
        width: 38px;
        height: 38px; /* Nhỏ hơn một chút */
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 1rem; /* Nhỏ hơn */
        flex-shrink: 0;
        margin-left: 0.5rem;
      }
      .delete-button:hover {
        background: #ffebee;
        color: var(--error);
        transform: scale(1.1);
      }

      .actions-container {
        display: flex;
        gap: 1.5rem;
        justify-content: flex-end;
        margin-top: 3rem;
        flex-wrap: wrap;
      }
      .btn {
        padding: 0.9rem 1.8rem;
        border: 1px solid transparent;
        border-radius: 35px;
        font-weight: 600;
        font-size: 1.05rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: var(--shadow);
      }
      .btn-primary {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        color: white;
      }
      .btn-primary:hover {
        background-color: var(--primary-hover);
        border-color: var(--primary-hover);
        box-shadow: var(--glow);
        transform: translateY(-3px);
      }
      .btn-secondary {
        background-color: var(--card-bg);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }
      .btn-secondary:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(90, 103, 216, 0.08);
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.3s ease-out;
      }
      .modal-content {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: 18px;
        box-shadow: var(--shadow);
        width: 90%;
        max-width: 600px;
        animation: slideInUp 0.4s ease-out;
        border: 1px solid var(--border-color);
      }
      .modal-content h2 {
        font-size: 2rem;
        margin-bottom: 0.85rem;
        color: var(--text-primary);
        font-weight: 700;
      }
      .modal-content p {
        color: var(--text-secondary);
        margin-bottom: 2rem;
        line-height: 1.7;
        font-size: 1.1rem;
      }
      .modal-textarea {
        width: 100%;
        padding: 1.1rem;
        border: 1px solid var(--border-darker);
        border-radius: 12px;
        font-size: 1.1rem;
        background: var(--input-bg);
        resize: vertical;
        min-height: 200px;
        font-family: "Inter", sans-serif;
        transition: border-color 0.2s, box-shadow 0.2s;
        color: var(--text-primary);
      }
      .modal-textarea:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(90, 103, 216, 0.2);
        outline: none;
        background: white;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1.25rem;
        margin-top: 2rem;
      }

      .notification {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 1.1rem 2rem;
        border-radius: 12px;
        color: white;
        z-index: 2000;
        opacity: 0;
        transition: opacity 0.3s ease, transform 0.4s ease;
        transform: translateY(30px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        min-width: 280px;
      }
      .notification.show {
        opacity: 1;
        transform: translateY(0);
      }
      .notification.success {
        background-color: var(--success);
      }
      .notification.error {
        background-color: var(--error);
      }
      .notification.warning {
        background-color: var(--warning);
      }
      .notification .icon {
        font-size: 1.35rem;
      }

      .loading-spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #fff;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        animation: spin 1s linear infinite;
      }

      @media (max-width: 768px) {
        body {
          padding: 1rem;
        }
        .header {
          margin-bottom: 1.5rem;
        }
        .header h1 {
          font-size: 1.6rem;
        }
        .header .back-button {
          width: 40px;
          height: 40px;
          font-size: 1.1rem;
        }

        .config-section {
          padding: 1.5rem;
          margin-bottom: 1.5rem;
          border-radius: 15px;
        }
        .config-header {
          font-size: 1.15rem;
          margin-bottom: 1rem;
          padding-bottom: 0.75rem;
        }
        .setting-label {
          font-size: 0.95rem;
        }
        .toggle-switch {
          width: 50px;
          height: 28px;
        }
        .slider:before {
          height: 20px;
          width: 20px;
          left: 4px;
          bottom: 4px;
        }
        input:checked + .slider:before {
          transform: translateX(20px);
        }

        .vocabulary-cards {
          gap: 0.75rem;
          margin-bottom: 1.5rem;
        }

        .vocabulary-card {
          padding: 0.6rem 0.8rem; /* Giảm padding nhiều hơn */
          border-radius: 10px;
          gap: 0.6rem; /* Giảm gap */
        }
        .card-number {
          font-size: 0.8rem;
          width: 30px;
          margin-right: 0.25rem;
        }
        .form-group label {
          font-size: 0.75rem;
        }
        .form-group .main-label {
          font-size: 0.8rem;
        }
        .form-group input {
          padding: 0.5rem 0.6rem;
          font-size: 0.85rem;
          border-radius: 7px;
        }
        .form-group input::placeholder {
          font-size: 0.75rem;
        }

        .image-upload-container {
          width: 40px;
          height: 40px;
          margin-left: 0.25rem;
        }
        .image-preview {
          border-radius: 7px;
        }
        .image-preview .upload-icon {
          font-size: 1rem;
        }
        .image-remove-btn {
          width: 18px;
          height: 18px;
          font-size: 0.65rem;
          top: -3px;
          right: -3px;
        }

        .delete-button {
          width: 32px;
          height: 32px;
          font-size: 0.9rem;
          margin-left: 0.25rem;
        }

        .actions-container {
          flex-direction: column;
          align-items: stretch;
          gap: 0.8rem;
          margin-top: 1.5rem;
        }
        .btn {
          width: 100%;
          padding: 0.7rem 1.2rem;
          font-size: 0.9rem;
        }

        .modal-content {
          padding: 1.5rem;
          border-radius: 15px;
        }
        .modal-content h2 {
          font-size: 1.4rem;
          margin-bottom: 0.75rem;
        }
        .modal-content p {
          font-size: 0.95rem;
          margin-bottom: 1rem;
        }
        .modal-textarea {
          min-height: 120px;
          font-size: 0.9rem;
          padding: 0.8rem;
          border-radius: 10px;
        }
        .modal-actions {
          margin-top: 1.2rem;
          gap: 1rem;
        }
        .notification {
          bottom: 10px;
          right: 10px;
          padding: 0.8rem 1rem;
          font-size: 0.8rem;
          min-width: unset;
        }
        .notification .icon {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="vocabulary.html" class="back-button">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h1>Tạo bộ thẻ mới</h1>
      </header>

      <section class="config-section">
        <h2 class="config-header">Cài đặt</h2>
        <div class="setting">
          <span class="setting-label">Dịch và điền tự động bằng AI</span>
          <label class="toggle-switch">
            <input type="checkbox" id="autoTranslateToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <main class="vocabulary-cards" id="vocabularyCards"></main>

      <footer class="actions-container">
        <button class="btn btn-secondary" onclick="addCard()">
          <i class="fas fa-plus"></i> Thêm thẻ
        </button>
        <button class="btn btn-secondary" onclick="showBulkInputModal()">
          <i class="fas fa-file-import"></i> Nhập hàng loạt
        </button>
        <button class="btn btn-primary" onclick="createFlashcards()">
          <i class="fas fa-save"></i> Lưu & Bắt đầu học
        </button>
      </footer>
    </div>

    <div id="bulkInputModal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <h2>Nhập Hàng Loạt</h2>
        <p>
          Nhập mỗi từ trên một dòng. Hệ thống sẽ dùng AI để tự động dịch và điền
          các thông tin còn lại.
        </p>
        <textarea
          id="bulkText"
          rows="8"
          placeholder="serendipity&#10;ephemeral&#10;ubiquitous"
          class="modal-textarea"
        ></textarea>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="hideBulkInputModal()">
            Hủy
          </button>
          <button
            class="btn btn-primary"
            id="processBulkBtn"
            onclick="processBulkInput()"
          >
            <i class="fas fa-check"></i> Xử lý & Thêm
          </button>
        </div>
      </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
      const WORKER_URL = "https://api-alpha-six-99.vercel.app/api/chat";
      let currentFolderId = null;
      let isAutoTranslateEnabled = true;
      const processingQueue = [];
      let isProcessingQueue = false;

      document.addEventListener("DOMContentLoaded", () => {
        initializeAutoTranslateToggle();

        const urlParams = new URLSearchParams(window.location.search);
        currentFolderId = urlParams.get("id");

        if (!currentFolderId) {
          showNotification("Lỗi: Không tìm thấy ID thư mục!", "error");
          setTimeout(() => (window.location.href = "vocabulary.html"), 2000);
          return;
        }

        const existingFlashcards = localStorage.getItem(
          `flashcards_${currentFolderId}`
        );
        if (existingFlashcards) {
          window.location.href = `study-options.html?id=${currentFolderId}`;
          return;
        }

        if (
          document.getElementById("vocabularyCards").childElementCount === 0
        ) {
          addCard();
        }
      });

      function initializeAutoTranslateToggle() {
        const toggle = document.getElementById("autoTranslateToggle");
        const savedState = localStorage.getItem("autoTranslateEnabled");
        isAutoTranslateEnabled = savedState !== "false";
        toggle.checked = isAutoTranslateEnabled;
        toggle.addEventListener("change", (e) => {
          isAutoTranslateEnabled = e.target.checked;
          localStorage.setItem("autoTranslateEnabled", isAutoTranslateEnabled);
          showNotification(
            `AI đã ${isAutoTranslateEnabled ? "Bật" : "Tắt"}.`,
            "success"
          );
        });
      }

      function updateCardNumbers() {
        const cards = document.querySelectorAll(".vocabulary-card");
        cards.forEach((card, index) => {
          card.querySelector(".card-number").textContent = `#${index + 1}`;
        });
      }

      function addCard(data = {}) {
        const cardId = `card_${Date.now()}_${Math.random()
          .toString(36)
          .substr(2, 9)}`;
        const card = document.createElement("div");
        card.className = "vocabulary-card";
        card.id = cardId;

        card.innerHTML = `
                <span class="card-number"></span>
                <div class="form-group" style="flex: 2;">
                    <label class="main-label" for="word-${cardId}">Từ</label>
                    <input type="text" id="word-${cardId}" class="word-input" onchange="handleWordInput(this)" placeholder="English word" value="${
          data.word || ""
        }">
                </div>
                <div class="form-group" style="flex: 3;">
                    <label class="main-label" for="meaning-${cardId}">Nghĩa</label>
                    <input type="text" id="meaning-${cardId}" class="meaning-input" placeholder="Vietnamese meaning" value="${
          data.meaning || ""
        }">
                </div>
                <div class="form-group" style="min-width: 80px;">
                    <label for="type-${cardId}">Loại</label>
                    <input type="text" id="type-${cardId}" class="type-input" placeholder="noun" value="${
          data.type || ""
        }">
                </div>
                <div class="form-group" style="min-width: 90px;">
                    <label for="ipa-${cardId}">IPA</label>
                    <input type="text" id="ipa-${cardId}" class="ipa-input" placeholder="/ɪnˈkredəbəl/" value="${
          data.ipa || ""
        }">
                </div>
                <div class="image-upload-container">
                    <div class="image-preview" onclick="this.querySelector('input').click()">
                        ${
                          data.image
                            ? `<img src="${data.image}" alt="Preview">`
                            : '<div class="upload-icon"><i class="fas fa-image"></i></div>'
                        }
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, '${cardId}')">
                        ${
                          data.image
                            ? `<button class="image-remove-btn" onclick="removeImage(event, '${cardId}')"><i class="fas fa-times"></i></button>`
                            : ""
                        }
                    </div>
                </div>
                <button class="delete-button" onclick="deleteCard('${cardId}')"><i class="fas fa-times"></i></button>
            `;
        document.getElementById("vocabularyCards").appendChild(card);
        updateCardNumbers();
      }

      function deleteCard(cardId) {
        document.getElementById(cardId)?.remove();
        if (document.querySelectorAll(".vocabulary-card").length === 0) {
          addCard();
        }
        updateCardNumbers();
      }

      function removeImage(event, cardId) {
        event.stopPropagation(); // Ngăn sự kiện click lan ra image-preview
        const card = document.getElementById(cardId);
        const previewContainer = card.querySelector(".image-preview");
        previewContainer.innerHTML =
          '<div class="upload-icon"><i class="fas fa-image"></i></div><input type="file" accept="image/*" onchange="handleImageUpload(event, \'' +
          cardId +
          "')\">";
        delete previewContainer.dataset.imageData;
      }

      function handleWordInput(inputElement) {
        if (isAutoTranslateEnabled) {
          fetchFullTranslation(inputElement);
        }
      }

      async function fetchFullTranslation(inputElement) {
        const card = inputElement.closest(".vocabulary-card");
        const word = inputElement.value.trim();
        if (!word) {
          resetPlaceholders(card);
          return;
        }

        const meaningInput = card.querySelector(".meaning-input");
        const typeInput = card.querySelector(".type-input");
        const ipaInput = card.querySelector(".ipa-input");

        // Lưu trạng thái ban đầu của placeholder để khôi phục
        const originalMeaningPlaceholder = meaningInput.placeholder;
        const originalTypePlaceholder = typeInput.placeholder;
        const originalIpaPlaceholder = ipaInput.placeholder;

        meaningInput.placeholder = "Đang tra cứu...";
        typeInput.placeholder = "...";
        ipaInput.placeholder = "...";
        // Không xóa value cũ để người dùng vẫn nhìn thấy nếu có
        // meaningInput.value = "";
        // typeInput.value = "";
        // ipaInput.value = "";

        const systemPrompt = `You are an expert English-Vietnamese dictionary. For a given English word, return a structured JSON object. The JSON must include these keys: "meaning" (the most common Vietnamese translation), "type" (the word type in lowercase, e.g., 'noun', 'verb'), and "ipa" (the IPA transcription, including slashes). Word: "${word}"`;

        try {
          const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "gpt-4-turbo",
              messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: `Word: ${word}` },
              ],
              temperature: 0.3,
              response_format: { type: "json_object" },
            }),
          });
          if (!response.ok)
            throw new Error(`API error! status: ${response.status}`);

          const result = await response.json();
          const content = JSON.parse(result.choices[0].message.content);

          meaningInput.value = content.meaning || "";
          typeInput.value = content.type || "";
          ipaInput.value = content.ipa || "";
        } catch (error) {
          console.error("Error fetching translation:", error);
          showNotification(`Lỗi khi tra cứu từ "${word}"`, "error");
          meaningInput.value = "";
          typeInput.value = "";
          ipaInput.value = "";
        } finally {
          // Khôi phục placeholder
          meaningInput.placeholder = originalMeaningPlaceholder;
          typeInput.placeholder = originalTypePlaceholder;
          ipaInput.placeholder = originalIpaPlaceholder;
        }
      }

      function resetPlaceholders(card) {
        card.querySelector(".meaning-input").placeholder = "Vietnamese meaning";
        card.querySelector(".type-input").placeholder = "noun";
        card.querySelector(".ipa-input").placeholder = "/ɪnˈkredəbəl/";
      }

      async function handleImageUpload(event, cardId) {
        const card = document.getElementById(cardId);
        const previewContainer = card.querySelector(".image-preview");
        const fileInput = event.target;
        const file = fileInput.files[0];
        if (!file) {
          previewContainer.innerHTML =
            '<div class="upload-icon"><i class="fas fa-image"></i></div>';
          delete previewContainer.dataset.imageData;
          return;
        }

        if (file.size > 2 * 1024 * 1024) {
          // 2MB limit
          showNotification("Ảnh không được lớn hơn 2MB!", "error");
          fileInput.value = "";
          previewContainer.innerHTML =
            '<div class="upload-icon"><i class="fas fa-exclamation-circle" style="color: var(--error);"></i></div>';
          return;
        }

        previewContainer.innerHTML = `<div class="loading-spinner"></div>`; // Spinner nhỏ
        try {
          // Compress image to a smaller size and quality
          const compressedFile = await imageCompression(file, {
            maxSizeMB: 0.5, // Max 500KB
            maxWidthOrHeight: 400, // Max 400px on either side
            useWebWorker: true,
            // Keep original image ratio
            initialQuality: 0.8,
          });
          const reader = new FileReader();
          reader.onload = (e) => {
            previewContainer.innerHTML = `<img src="${e.target.result}" alt="Preview">
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, '${cardId}')" style="display:none;">
                        <button class="image-remove-btn" onclick="removeImage(event, '${cardId}')"><i class="fas fa-times"></i></button>`;
            previewContainer.dataset.imageData = e.target.result;
          };
          reader.readAsDataURL(compressedFile);
        } catch (error) {
          console.error("Image processing error:", error);
          showNotification("Lỗi khi xử lý ảnh.", "error");
          previewContainer.innerHTML = `<div class="upload-icon"><i class="fas fa-exclamation-circle" style="color: var(--error);"></i></div><input type="file" accept="image/*" onchange="handleImageUpload(event, '${cardId}')">`;
        }
      }

      function createFlashcards() {
        const cards = [];
        let hasError = false;

        document.querySelectorAll(".vocabulary-card").forEach((card, index) => {
          const word = card.querySelector(".word-input").value.trim();
          const meaning = card.querySelector(".meaning-input").value.trim();
          const type = card.querySelector(".type-input").value.trim();
          const ipa = card.querySelector(".ipa-input").value.trim();
          const image =
            card.querySelector(".image-preview").dataset.imageData || null;

          if (word && meaning) {
            if (
              cards.some((c) => c.word.toLowerCase() === word.toLowerCase())
            ) {
              showNotification(`Từ "${word}" bị trùng lặp!`, "warning");
              hasError = true;
              return;
            }
            cards.push({
              id: `card_${Date.now()}_${index}`,
              word,
              meaning,
              type,
              ipa,
              image,
            });
          } else if (word || meaning) {
            showNotification(
              `Thẻ #${index + 1} chưa điền đủ Từ và Nghĩa.`,
              "error"
            );
            hasError = true;
          }
        });

        if (hasError) return;
        if (!cards.length) {
          showNotification("Vui lòng nhập ít nhất một từ vựng!", "warning");
          return;
        }

        try {
          localStorage.setItem(
            `flashcards_${currentFolderId}`,
            JSON.stringify(cards)
          );
          const folders =
            JSON.parse(localStorage.getItem("vocabularyFolders")) || {};

          let folderFound = false;
          for (let dayKey in folders) {
            if (Array.isArray(folders[dayKey])) {
              const folderIndex = folders[dayKey].findIndex(
                (f) => f.id === parseInt(currentFolderId)
              );
              if (folderIndex !== -1) {
                folders[dayKey][folderIndex].wordCount = cards.length;
                folderFound = true;
                break;
              }
            }
          }

          if (folderFound) {
            localStorage.setItem("vocabularyFolders", JSON.stringify(folders));
          } else {
            console.warn(
              "Folder not found in localStorage, word count not updated."
            );
          }

          showNotification("Đã lưu bộ thẻ thành công!", "success");
          setTimeout(
            () =>
              (window.location.href = `study-options.html?id=${currentFolderId}`),
            1500
          );
        } catch (e) {
          console.error("Lỗi khi lưu vào localStorage:", e);
          showNotification("Lỗi khi lưu! Dữ liệu có thể quá lớn.", "error");
        }
      }

      function showBulkInputModal() {
        document.getElementById("bulkInputModal").style.display = "flex";
      }
      function hideBulkInputModal() {
        document.getElementById("bulkInputModal").style.display = "none";
      }

      async function processBulkInput() {
        const bulkText = document.getElementById("bulkText").value.trim();
        if (!bulkText) {
          showNotification("Vui lòng nhập dữ liệu!", "warning");
          return;
        }
        hideBulkInputModal();
        showNotification("Bắt đầu xử lý hàng loạt...", "success");

        const existingCards = document.querySelectorAll(".vocabulary-card");
        if (
          existingCards.length === 1 &&
          !existingCards[0].querySelector(".word-input").value.trim()
        ) {
          existingCards[0].remove();
        }

        const lines = bulkText.split("\n").filter((line) => line.trim() !== "");
        const wordsToProcess = lines.map((line) => line.trim());

        wordsToProcess.forEach((word) => {
          addCard({ word });
        });
        updateCardNumbers();

        const concurrencyLimit = 3; // Giảm giới hạn đồng thời để tránh quá tải API
        let activePromises = 0;
        let index = 0;

        const processNext = async () => {
          if (index >= wordsToProcess.length && activePromises === 0) {
            document.getElementById("bulkText").value = "";
            showNotification(
              `Đã thêm và dịch ${wordsToProcess.length} từ vựng!`,
              "success"
            );
            return;
          }

          while (
            index < wordsToProcess.length &&
            activePromises < concurrencyLimit
          ) {
            const word = wordsToProcess[index];
            const newCardElement = document.querySelector(
              `.vocabulary-card:nth-child(${
                document.querySelectorAll(".vocabulary-card").length -
                (wordsToProcess.length - index) +
                1
              })`
            );

            if (newCardElement) {
              const wordInput = newCardElement.querySelector(".word-input");
              activePromises++;
              await fetchFullTranslation(wordInput) // Dùng await để đảm bảo thứ tự
                .catch((e) => {
                  console.error(`Error processing word "${word}":`, e);
                })
                .finally(() => {
                  activePromises--;
                  processNext();
                });
            }
            index++;
          }
        };
        processNext();
      }

      function showNotification(message, type) {
        const notification = document.getElementById("notification");
        notification.textContent = message;
        notification.className = `notification show ${type}`;
        const iconHtml =
          {
            success: '<i class="fas fa-check-circle icon"></i>',
            error: '<i class="fas fa-times-circle icon"></i>',
            warning: '<i class="fas fa-exclamation-triangle icon"></i>',
          }[type] || "";
        notification.innerHTML = iconHtml + message;

        setTimeout(() => {
          notification.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
